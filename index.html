<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Isu Chat Full</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(to bottom,#fff,#ffd6ec);
}

/* Loading */
#loading{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  color:hotpink;
}

/* Tabs */
.tabs{
  position:fixed;
  bottom:0;
  width:100%;
  display:flex;
  background:pink;
}
.tabs button{
  flex:1;
  padding:12px;
  border:none;
  background:none;
}

/* Tab */
.tab{padding:10px;}
.hidden{display:none;}

/* Chat */
#messages{
  height:50vh;
  overflow:auto;
}
.msg{margin:5px;}
.user{text-align:right;}
.bot{text-align:left;}

/* Avatar */
.avatar{
  width:30px;
  border-radius:50%;
  vertical-align:middle;
}

/* Candy effect */
.candy{
  position:absolute;
  width:10px;
  height:10px;
  background:pink;
  border-radius:50%;
  animation:explode 1s forwards;
}
@keyframes explode{
  to{transform:scale(5) translateY(-50px);opacity:0;}
}

/* Side menu */
#sideMenu{
  position:fixed;
  left:-200px;
  top:0;
  width:200px;
  height:100%;
  background:white;
  transition:0.3s;
}
#sideMenu button{
  width:100%;
  padding:10px;
  border:none;
  background:#ffe6f2;
}
</style>
</head>

<body>

<!-- Loading -->
<div id="loading">
  <h2>🍭 Đang kiểm tra hệ thống...</h2>
  <p id="cuteText"></p>
</div>

<div id="app" class="hidden">

<!-- Side menu -->
<div id="sideMenu">
<button onclick="showLog()">📖 Nhật kí</button>
<button onclick="showNote()">📝 Ghi chú</button>
</div>

<!-- Tabs -->
<div class="tabs">
<button onclick="openTab(1)">🏠</button>
<button onclick="openTab(2)">💬</button>
<button onclick="openTab(3)">📸</button>
<button onclick="openTab(4)">👥</button>
<button onclick="openTab(5)">👤</button>
</div>

<!-- TAB 1: tạo nhân vật -->
<div id="tab1" class="tab">
<h3>Tạo nhân vật</h3>

<input id="name" placeholder="Tên"><br>
<input type="file" id="avatarFile"><br>
<img id="preview" width="60"><br>

<input id="personality" placeholder="Tính cách"><br>
<input id="style" placeholder="Phong cách nói"><br>
<input id="firstMessage" placeholder="Câu đầu tiên"><br>

<button onclick="createChar()">Tạo</button>

<div id="charList"></div>
</div>

<!-- TAB 2: chat -->
<div id="tab2" class="tab hidden">
<button onclick="toggleMenu()">☰</button>
<h3 id="chatName">Chưa chọn</h3>
<p id="level">❤️ 0</p>

<div id="messages"></div>
<div id="thought"></div>

<input id="input">
<button onclick="send()">Gửi</button>
</div>

<!-- TAB 3 -->
<div id="tab3" class="tab hidden">
<textarea id="post"></textarea>
<button onclick="addPost()">Đăng</button>
<div id="posts"></div>
</div>

<!-- TAB 4 -->
<div id="tab4" class="tab hidden">
<p>👥 Social demo</p>
</div>

<!-- TAB 5 -->
<div id="tab5" class="tab hidden">
<p>🍬 Kẹo: <span id="candy">100</span></p>
<p>🔥 Day: <span id="day">1</span>/7</p>
<button onclick="daily()">Điểm danh</button>

<p>📺 Ads: <span id="ads">0</span>/50</p>
<button onclick="watchAd()">Xem quảng cáo</button>

<button onclick="randomGift()">🎁 Quà random</button>
</div>

</div>

<script>
let chars=[];
let current=null;
let affection=0;
let candy=100;
let day=1;
let ads=0;
let avatarData="";
let lastReplies=[];

/* Loading */
let texts=["Đợi xíu nhaaa~ 💖","Sắp xong rồi~","Đang yêu bạn 😳"];
cuteText.innerText=texts[Math.floor(Math.random()*texts.length)];

setTimeout(()=>{
  loading.style.display="none";
  app.classList.remove("hidden");
  candyEffect();
},3000);

/* Tabs */
function openTab(n){
  document.querySelectorAll(".tab").forEach(t=>t.classList.add("hidden"));
  document.getElementById("tab"+n).classList.remove("hidden");
}

/* Candy effect */
function candyEffect(){
  for(let i=0;i<20;i++){
    let c=document.createElement("div");
    c.className="candy";
    c.style.left=Math.random()*100+"%";
    c.style.top="50%";
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),1000);
  }
}

/* Upload avatar */
avatarFile.addEventListener("change",function(){
  let file=this.files[0];
  let reader=new FileReader();
  reader.onload=e=>{
    avatarData=e.target.result;
    preview.src=avatarData;
  };
  reader.readAsDataURL(file);
});

/* Create char */
function createChar(){
  let char={
    name:name.value,
    avatar:avatarData,
    personality:personality.value.toLowerCase(),
    style:style.value,
    first:firstMessage.value,
    memory:[],
    notes:[],
    log:[],
    mood:0
  };

  chars.push(char);

  let d=document.createElement("div");
  d.innerHTML=`<img src="${char.avatar}" width="30"> ${char.name}`;

  d.onclick=()=>{
    current=char;
    chatName.innerText=char.name;
    messages.innerHTML="";
    affection=0;
    addMsg(char.first || "…Xin chào.", "bot");
  };

  charList.appendChild(d);
}

/* Chat */
function send(){
  if(!current) return alert("Chọn nhân vật!");

  let text=input.value;
  addMsg(text,"user");

  let reply=generateReply(text,current);
  let heart=calcHeart(text);

  setTimeout(()=>addMsg(reply,"bot"),500);

  affection+=heart;
  updateLevel();
  updateThought();

  current.log.push(text);
  if(heart>=5) current.notes.push(text);

  input.value="";
}

/* Reply thông minh */
function generateReply(text,char){
  let p=char.personality;
  let reply="";

  if(p.includes("lạnh")){
    reply="Ừ.";
  }else if(p.includes("tsundere")){
    reply="Đừng hiểu lầm!";
  }else{
    reply="Tớ đang nghe.";
  }

  if(text.includes("yêu")) reply="Cậu làm tớ ngại đó 💖";
  if(text.includes("ngu")) reply="…Tớ không thích vậy.";

  // chống lặp
  if(lastReplies.includes(reply)){
    reply+=" …";
  }

  lastReplies.push(reply);
  if(lastReplies.length>3) lastReplies.shift();

  return reply;
}

/* Heart */
function calcHeart(text){
  if(text.includes("yêu")) return 5;
  if(text.includes("ngu")) return -5;
  return Math.floor(Math.random()*3)+1;
}

/* Level */
function updateLevel(){
  level.innerText="❤️ "+affection;
}

/* Thought */
function updateThought(){
  if(affection>50) thought.innerText="…Cậu đặc biệt thật.";
  else if(affection<0) thought.innerText="…Khó chịu.";
  else thought.innerText="…Bình thường.";
}

/* Message */
function addMsg(text,type){
  let m=document.createElement("div");
  m.className="msg "+type;

  if(type==="bot" && current.avatar){
    m.innerHTML=`<img src="${current.avatar}" class="avatar"> ${text}`;
  }else{
    m.innerText=text;
  }

  messages.appendChild(m);
}

/* Menu */
function toggleMenu(){
  sideMenu.style.left = sideMenu.style.left==="0px"?"-200px":"0px";
}
function showLog(){
  alert(current.log.join("\n"));
}
function showNote(){
  alert(current.notes.join("\n"));
}

/* Post */
function addPost(){
  let d=document.createElement("div");
  d.innerText=post.value;
  posts.appendChild(d);
}

/* Candy */
function daily(){
  if(day<7){candy+=20;day++;}
  else{candy+=100;day=1;}
  updateCandy();
  candyEffect();
}
function watchAd(){
  if(ads>=50) return alert("Hết lượt!");
  setTimeout(()=>{
    candy+=5;
    ads++;
    updateCandy();
    candyEffect();
  },15000);
}
function randomGift(){
  let r=Math.floor(Math.random()*50)+10;
  candy+=r;
  updateCandy();
  alert("🎁 +"+r);
}
function updateCandy(){
  document.getElementById("candy").innerText=candy;
  document.getElementById("day").innerText=day;
  document.getElementById("ads").innerText=ads;
}
</script>

</body>
</html>
