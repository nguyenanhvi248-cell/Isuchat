: <!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isu Chat - Thế Giới Kẹo Hồng</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --pink-light: #ffe4e1;
            --pink-main: #ffb6c1;
            --pink-dark: #ff69b4;
            --white: #ffffff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--pink-light); color: #333; overflow: hidden;
        }

        /* Màn hình chờ */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pink-main); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 9999;
            transition: opacity 0.5s ease;
        }
        .loading-heart { font-size: 50px; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }

        /* Layout chính */
        #app-container { display: none; height: 100vh; flex-direction: column; }
        #content { flex: 1; overflow-y: auto; padding-bottom: 70px; position: relative; }

        /* Navigation */
        #nav-bar {
            position: fixed; bottom: 0; width: 100%; height: 65px;
            background: var(--white); display: flex; border-top: 2px solid var(--pink-main);
            z-index: 1000;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; 
            justify-content: center; font-size: 12px; color: #888;
        }
        .nav-item.active { color: var(--pink-dark); font-weight: bold; }
        .nav-item i { font-size: 20px; margin-bottom: 4px; }

        /* Header & Search */
        .header { 
            background: var(--pink-main); padding: 15px; display: flex; 
            justify-content: space-between; align-items: center; color: white;
            position: sticky; top: 0; z-index: 100;
        }
        .search-box { background: rgba(255,255,255,0.3); border: none; border-radius: 15px; padding: 5px 10px; color: white; }

        /* Tab 1: Khám phá */
        .character-card {
            background: white; margin: 10px; border-radius: 15px; overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: flex; padding: 10px;
        }
        .char-img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; }
        .add-btn {
            position: fixed; bottom: 80px; right: 20px; width: 60px; height: 60px;
            background: var(--pink-dark); border-radius: 50%; display: flex;
            align-items: center; justify-content: center; color: white; font-size: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Giao diện Chat */
        #chat-window {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 2000; display: none; flex-direction: column;
        }
        .affection-bar {
            background: var(--pink-light); padding: 5px; text-align: center;
            font-weight: bold; font-size: 13px; color: var(--pink-dark);
        }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; background: #fffafb; }
        .message { margin-bottom: 15px; max-width: 80%; padding: 10px; border-radius: 15px; }
        .bot { background: var(--pink-main); align-self: flex-start; }
        .user { background: #e0e0e0; align-self: flex-end; margin-left: auto; }
        .thought-bubble {
            background: rgba(255,182,193,0.3); border-radius: 20px; padding: 5px 15px;
            font-style: italic; font-size: 12px; margin-top: 5px; display: inline-block;
        }

        /* Tab 5: Profile */
        .profile-header { text-align: center; padding: 20px; background: var(--pink-light); }
        .profile-img { width: 100px; height: 100px; border-radius: 50%; border: 3px solid white; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; }
        .stat-card { background: white; padding: 15px; border-radius: 10px; text-align: center; }

        /* Modal & Form */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); z-index: 3000; display: none;
            align-items: center; justify-content: center;
        }
        .modal-content { background: white; width: 90%; max-height: 80%; overflow-y: auto; border-radius: 20px; padding: 20px; }
        input, textarea, select { width: 100%; margin: 8px 0; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }

        .kẹo-button { background: var(--pink-dark); color: white; border: none; padding: 10px; border-radius: 20px; width: 100%; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loading-heart">💖</div>
        <h2 style="color: white;">Isu Chat</h2>
        <p id="splash-text" style="color: white; font-style: italic;"></p>
    </div>

    <div id="app-container">
        <div class="header" id="main-header">
            <span style="font-weight: bold; font-size: 1.2em;">Isu Chat</span>
            <input type="text" class="search-box" placeholder="Tìm nhân vật...">
        </div>

        <div id="content">
            </div>

        <div id="nav-bar">
            <div class="nav-item active" onclick="switchTab(1)"><i>🏠</i><span>Khám phá</span></div>
            <div class="nav-item" onclick="switchTab(2)"><i>💬</i><span>Đoạn chat</span></div>
            <div class="nav-item" onclick="switchTab(3)"><i>📱</i><span>Bảng tin</span></div>
            <div class="nav-item" onclick="switchTab(4)"><i>👥</i><span>Cộng đồng</span></div>
            <div class="nav-item" onclick="switchTab(5)"><i>👤</i><span>Hồ sơ</span></div>
        </div>
    </div>

    <div id="chat-window">
        <div class="affection-bar" id="affection-display">Thiện cảm: 0 (Bình thường)</div>
        <div class="header" style="background: var(--pink-dark);">
            <button onclick="closeChat()" style="background:none; border:none; color:white; font-size:20px;">❮</button>
            <span id="chat-with-name">Tên nhân vật</span>
            <select id="chat-mode" style="width: auto; margin: 0; font-size: 10px;">
                <option value="5">Thường (5🍬)</option>
                <option value="10">Khá (10🍬)</option>
                <option value="15">Pro (15🍬)</option>
                <option value="20">VIP (20🍬)</option>
            </select>
        </div>
        <div class="chat-messages" id="chat-logs"></div>
        <div id="thought-area" style="padding: 0 15px;"></div>
        <div style="padding: 10px; display: flex; align-items: center; border-top: 1px solid #eee;">
            <button onclick="toggleExtraMenu()" style="padding: 10px;">&lt;</button>
            <input type="text" id="user-input" placeholder="Nhắn gì đó đáng yêu...">
            <button onclick="sendMessage()" style="padding: 10px; color: var(--pink-dark); background: none; border: none; font-weight: bold;">Gửi</button>
        </div>
        <div id="extra-menu" style="display:none; grid-template-columns: repeat(3, 1fr); gap: 5px; padding: 10px; background: #fff;">
            <button onclick="showNote('Nhật ký')">Nhật ký</button>
            <button onclick="checkPhone()">Điện thoại (50🍬)</button>
            <button onclick="showNote('Ghi chú')">Ghi chú</button>
        </div>
    </div>

    <div id="create-modal" class="modal">
        <div class="modal-content">
            <h3>Tạo nhân vật mới</h3>
            <input type="text" id="new-name" placeholder="Tên nhân vật">
            <input type="text" id="new-img" placeholder="Link ảnh đại diện">
            <select id="new-gender"><option>Nam</option><option>Nữ</option><option>Khác</option></select>
            <textarea id="new-bio" placeholder="Thông tin công khai / Tính cách"></textarea>
            <input type="text" id="new-first-word" placeholder="Lời chào đầu tiên">
            <button class="kẹo-button" onclick="saveCharacter()">Tạo Ngay ✨</button>
            <button onclick="hideModal()" style="width:100%; margin-top:10px; background:none; border:none; color:gray;">Hủy</button>
        </div>
    </div>

    <script>
        // --- DỮ LIỆU HỆ THỐNG ---
        let userData = {
            name: "Người dùng mới",
            kẹo: 500,
            lastCheckIn: null,
            dailyAds: 0,
            inventory: [],
            checkInStreak: 0
        };

        let characters = [
            { id: 1, name: "Isu-chan", img: "https://i.pinimg.com/originals/a9/8a/d3/a98ad3c3062093554b7348984920b77b.jpg", intro: "Chào cậu, mình đã đợi cậu từ rất lâu rồi đó!", hearts: 0, personality: "Ngọt ngào" }
        ];

        let currentTab = 1;
        let activeChatChar = null;

        // --- MÀN HÌNH CHỜ ---
        const splashPhrases = ["Đang nạp kẹo hồng...", "Hệ thống đang kiểm tra sự đáng yêu của bạn...", "Chờ một xíu nhé, kẹo sắp nổ rồi!"];
        window.onload = () => {
            document.getElementById('splash-text').innerText = splashPhrases[Math.floor(Math.random() * splashPhrases.length)];
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('splash-screen').style.display = 'none';
                    document.getElementById('app-container').style.display = 'flex';
                    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#ffb6c1', '#ff69b4', '#ffffff'] });
                    switchTab(1);
                }, 500);
            }, 3000);
        };

        // --- QUẢN LÝ TAB ---
        function switchTab(tabIndex) {
            currentTab = tabIndex;
            document.querySelectorAll('.nav-item').forEach((el, idx) => {
                el.classList.toggle('active', idx + 1 === tabIndex);
            });
            renderContent();
        }

        function renderContent() {
            const content = document.getElementById('content');
            if (tabIndex === 1) { /* Logic Render Tab 1 */ }
            // Tạm thời viết logic nhanh cho các tab:
            let html = "";
            switch(currentTab) {
                case 1:
                    html = `<div style="padding:10px;"><h3>Khám phá</h3>`;
                    characters.forEach(c => {
                        html += `
                        <div class="character-card" onclick="openChat(${c.id})">
                            <img src="${c.img}" class="char-img">
                            <div style="margin-left:10px;">
                                <strong>${c.name}</strong><br>
                                <small>${c.intro}</small>
                            </div>
                        </div>`;
                    });
                    html += `</div><div class="add-btn" onclick="showModal()">+</div>`;
                    break;
                case 2:
                    html = `<div style="padding:10px;"><h3>Đoạn chat gần đây</h3><p style="text-align:center; color:gray;">Chưa có đoạn chat nào mới</p></div>`;
                    break;
                case 5:
                    html = `
                    <div class="profile-header">
                        <img src="https://via.placeholder.com/100" class="profile-img">
                        <h4>${userData.name}</h4>
                        <p>Kẹo hiện có: ${userData.kẹo} 🍬</p>
                    </div>
                    <div class="stats-grid">
                        <div class="stat-card" onclick="dailyCheckIn()">📅 Điểm danh</div>
                        <div class="stat-card" onclick="watchAd()">📺 Xem QC (5🍬)</div>
                        <div class="stat-card" onclick="rechargeKẹo()">💳 Nạp Kẹo</div>
                        <div class="stat-card">📜 Nhiệm vụ</div>
                    </div>`;
                    break;
                default:
                    html = `<div style="padding:20px; text-align:center;">Tính năng đang được phát triển...</div>`;
            }
            content.innerHTML = html;
        }

        // --- LOGIC CHAT & THIỆN CẢM ---
        function openChat(id) {
            activeChatChar = characters.find(c => c.id === id);
            document.getElementById('chat-window').style.display = 'flex';
            document.getElementById('chat-with-name').innerText = activeChatChar.name;
            updateAffectionUI();
        }

        function closeChat() { document.getElementById('chat-window').style.display = 'none'; }

        function updateAffectionUI() {
            let h = activeChatChar.hearts;
            let status = "Bình thường";
            if (h >= 1000) status = "Kết hôn 💍";
            else if (h >= 500) status = "Người yêu ❤️";
            else if (h >= 100) status = "Thân thiết";
            else if (h < 0) status = "Ghét 💢";
            
            document.getElementById('affection-display').innerText = `Thiện cảm: ${h} (${status})`;
        }

        function sendMessage() {
            let input = document.getElementById('user-input');
            let text = input.value.trim();
            if (!text) return;

            // Trừ kẹo
            let cost = parseInt(document.getElementById('chat-mode').value);
            if (userData.kẹo < cost) { alert("Không đủ kẹo rồi!"); return; }
            userData.kẹo -= cost;

            // Hiển thị tin nhắn người dùng
            appendMessage('user', text);
            input.value = "";

            // Xử lý tăng tim ngẫu nhiên
            let gain = Math.floor(Math.random() * 5) + 1;
            activeChatChar.hearts += gain;
            updateAffectionUI();

            // Phản hồi của bot (Giả lập)
            setTimeout(() => {
                appendMessage('bot', "Cảm ơn cậu đã nhắn cho mình nha! Moah~");
                if (gain === 5) {
                    document.getElementById('thought-area').innerHTML = `<div class="thought-bubble">Suy nghĩ của ${activeChatChar.name}: Hình như mình bắt đầu thích người này rồi...</div>`;
                }
            }, 1000);
        }

        function appendMessage(sender, text) {
            const logs = document.getElementById('chat-logs');
            logs.innerHTML += `<div class="message ${sender}">${text}</div>`;
            logs.scrollTop = logs.scrollHeight;
        }

        // --- HỆ THỐNG KẸO & ĐIỂM DANH ---
        function dailyCheckIn() {
            userData.kẹo += 20;
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.8 } });
            alert("Bạn nhận được 20 kẹo! Đừng quên quay lại mai nhé.");
            renderContent();
        }

        function watchAd() {
            if (userData.dailyAds >= 50) { alert("Hôm nay xem đủ rồi!"); return; }
            alert("Bắt đầu xem quảng cáo 15s...");
            setTimeout(() => {
                userData.kẹo += 5;
                userData.dailyAds++;
                confetti({ particleCount: 50, colors: ['#ffb6c1'] });
                renderContent();
            }, 2000); // Rút ngắn để test
        }

        // --- MODAL ---
        function showModal() { document.getElementById('create-modal').style.display = 'flex'; }
        function hideModal() { document.getElementById('create-modal').style.display = 'none'; }
        function saveCharacter() {
            let name = document.getElementById('new-name').value;
            if(!name) return;
            characters.push({
                id: Date.now(),
                name: name,
                img: document.getElementById('new-img').value || "https://via.placeholder.com/80",
                intro: document.getElementById('new-first-word').value,
                hearts: 0
            });
            hideModal();
            switchTab(1);
        }

        function toggleExtraMenu() {
            let menu = document.getElementById('extra-menu');
            menu.style.display = menu.style.display === 'none' ? 'grid' : 'none';
        }
    </script>
</body>
</html>
