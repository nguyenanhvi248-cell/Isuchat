<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Isu Chat Pink Master</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --pink-main: #ffafbd; --pink-dark: #ff8e91; --pink-soft: #fff1f3; --text: #8b5e61; }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--pink-soft); height: 100vh; display: flex; flex-direction: column; overflow: hidden; color: var(--text); }
        
        /* Hiệu ứng rung màn hình khi bạo kích */
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 30%, 70% { transform: translate3d(-4px, 0, 0); } }

        /* Chữ hiện lên khi nổ kẹo */
        #crit-text { position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%) scale(0); z-index: 10000; color: #ff1493; font-size: 50px; font-weight: 900; text-shadow: 0 0 20px #fff; pointer-events: none; transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        #crit-text.show { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }

        /* Giao diện */
        .head { background: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--pink-main); font-weight: bold; }
        #view { flex: 1; overflow-y: auto; padding-bottom: 85px; }
        
        nav { position: fixed; bottom: 0; width: 100%; height: 75px; background: #fff; display: flex; border-top: 1px solid #eee; z-index: 1000; box-shadow: 0 -2px 10px rgba(255,175,189,0.2); }
        .tab { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: #ccb0b2; transition: 0.2s; }
        .tab.active { color: var(--pink-dark); font-weight: bold; }
        .tab span { font-size: 22px; margin-bottom: 3px; }

        /* Components Xinh Yêu */
        .card { background: #fff; margin: 12px; padding: 15px; border-radius: 20px; display: flex; align-items: center; box-shadow: 0 4px 15px rgba(255,175,189,0.15); border: 1px solid var(--pink-soft); }
        .btn { background: linear-gradient(45deg, var(--pink-main), var(--pink-dark)); color: #fff; border: none; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; box-shadow: 0 4px 10px rgba(255,142,145,0.3); }
        .input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--pink-main); border-radius: 10px; outline: none; background: #fff; }
        
        /* Modal & Chat */
        #modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: none; align-items: center; justify-content: center; z-index: 5000; }
        .modal-box { background: #fff; width: 85%; padding: 25px; border-radius: 25px; text-align: center; }
        #chat-ui { position: fixed; inset: 0; background: var(--pink-soft); z-index: 2000; display: none; flex-direction: column; }
        .msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .m { padding: 12px 16px; border-radius: 18px; max-width: 80%; font-size: 14px; }
        .m.u { background: var(--pink-dark); color: #fff; align-self: flex-end; border-bottom-right-radius: 2px; }
        .m.b { background: #fff; align-self: flex-start; border-bottom-left-radius: 2px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    </style>
</head>
<body id="master-body">

    <div id="crit-text">BÙM CHÍU! 🍭</div>
    <div class="head">
        <span style="color: var(--pink-dark)">💖 ISU PINK PRO</span>
        <span id="candy-val">🍬 0</span>
    </div>

    <div id="view"></div>

    <nav>
        <div class="tab" onclick="go(1)"><span>🏠</span>Home</div>
        <div class="tab" onclick="go(2)"><span>🎁</span>Nhận Kẹo</div>
        <div class="tab" onclick="go(3)"><span>✨</span>Tạo NV</div>
        <div class="tab" onclick="go(4)"><span>🌎</span>Global</div>
        <div class="tab" onclick="go(5)"><span>🎀</span>Hồ Sơ</div>
    </nav>

    <div id="chat-ui">
        <div class="head">
            <button onclick="closeChat()" style="background:none; border:none; font-size:20px; color:var(--pink-dark)">❮ Back</button>
            <span id="chat-title">Nàng Thơ</span>
            <span></span>
        </div>
        <div class="msgs" id="chat-logs"></div>
        <div style="padding:15px; background:#fff; border-top:1px solid var(--pink-soft)">
            <div style="display:flex; justify-content:space-around; margin-bottom:10px; font-size:12px;">
                <label><input type="radio" name="r" value="5" checked> 5🍬</label>
                <label><input type="radio" name="r" value="10"> 10🍬</label>
                <label><input type="radio" name="r" value="20"> 20🍬 (NỔ)</label>
            </div>
            <div style="display:flex; gap:8px;">
                <input id="chat-input" class="input" style="margin:0" placeholder="Nhắn gì đó thật ngọt ngào...">
                <button onclick="sendMsg()" class="btn" style="width:70px; margin:0">GỬI</button>
            </div>
        </div>
    </div>

    <div id="modal" onclick="closeModal()"><div class="modal-box" id="modal-body" onclick="event.stopPropagation()"></div></div>

    <script>
        let candy = parseInt(localStorage.getItem('p_candy')) || 100;
        let profile = JSON.parse(localStorage.getItem('p_profile')) || { name: "Bé Yêu", avt: "https://i.pravatar.cc/150?u=pink" };
        let chars = JSON.parse(localStorage.getItem('p_chars')) || [{id:1, name:"Miu Miu", img:"https://i.pravatar.cc/150?u=cat", logs:[]}];
        let lastCheck = localStorage.getItem('p_lastCheck') || "";
        let currChar = null; let tempImg = "";

        function sync() { document.getElementById('candy-val').innerText = "🍬 " + candy; }
        
        // HIỆU ỨNG NỔ KẸO MÀU HỒNG
        function triggerBoom(txt) {
            document.getElementById('master-body').classList.add('shake');
            setTimeout(() => document.getElementById('master-body').classList.remove('shake'), 400);
            const cText = document.getElementById('crit-text');
            cText.innerText = txt;
            cText.classList.add('show');
            setTimeout(() => cText.classList.remove('show'), 1200);
            
            confetti({
                particleCount: 150, spread: 70, origin: { y: 0.6 },
                colors: ['#ffafbd', '#ff8e91', '#ffffff', '#ff1493', '#fff1f3']
            });
        }

        function go(n) {
            const v = document.getElementById('view'); sync();
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', (i+1) === n));

            if(n===1) v.innerHTML = `<div style="padding:10px">` + chars.map(c => `
                <div class="card" onclick="openChat(${c.id})">
                    <img src="${c.img}" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--pink-main)">
                    <div style="margin-left:15px"><b>${c.name}</b><br><small style="color:#aaa">Nhấn để chat nè~</small></div>
                </div>`).join('') + `</div>`;
            
            if(n===2) {
                let can = lastCheck !== new Date().toDateString();
                v.innerHTML = `<div style="text-align:center;padding:50px">
                    <span style="font-size:80px">🍭</span>
                    <h3>Quà tặng mỗi ngày</h3>
                    <button class="btn" ${can?'':'disabled'} onclick="doCheckin()">${can?'NHẬN 20 KẸO HỒNG':'MAI QUAY LẠI NHA'}</button>
                </div>`;
            }

            if(n===3) v.innerHTML = `<div style="padding:25px">
                <h3 style="text-align:center">✨ Tạo Nhân Vật Mới ✨</h3>
                <input id="c-name" class="input" placeholder="Tên nhân vật...">
                <div style="text-align:center">Ảnh đại diện:<br><input type="file" onchange="readImg(this)" class="input"></div>
                <button class="btn" onclick="saveChar()">LƯU VÀO DANH SÁCH</button>
            </div>`;

            if(n===4) v.innerHTML = `<div style="text-align:center;padding:100px;color:#ccb0b2">🌎 Đang tìm kiếm anh em...</div>`;

            if(n===5) v.innerHTML = `<div style="text-align:center;padding:40px">
                <img src="${profile.avt}" style="width:120px;height:120px;border-radius:50%;border:4px solid #fff;box-shadow:0 5px 15px rgba(0,0,0,0.1)">
                <h2>${profile.name}</h2>
                <div style="display:flex;gap:10px">
                    <button class="btn" style="background:#fff;color:var(--text)" onclick="editProfile()">SỬA HỒ SƠ</button>
                    <button class="btn" onclick="showQR()">NẠP THÊM 🍬</button>
                </div>
            </div>`;
        }

        // LOGIC CHAT & NỔ KẸO
        function openChat(id) { currChar = chars.find(x=>x.id===id); document.getElementById('chat-ui').style.display='flex'; document.getElementById('chat-title').innerText=currChar.name; renderMsgs(); }
        function sendMsg() {
            let inp = document.getElementById('chat-input'), r = parseInt(document.querySelector('input[name="r"]:checked').value);
            if(!inp.value || candy < r) return alert("Hết kẹo rồi bé ơi!");
            
            candy -= r; sync();
            if(r === 20) triggerBoom("SIÊU NGỌT NGÀO! 💖");
            
            currChar.logs.push({role:'u', text:inp.value}); renderMsgs();
            inp.value = "";
            setTimeout(() => {
                currChar.logs.push({role:'b', text: r === 20 ? "Anh làm em ngại quá đi... yêu sếp! 🥰" : "Em nghe nè~"});
                renderMsgs(); localStorage.setItem('p_chars', JSON.stringify(chars));
            }, 1000);
        }
        function renderMsgs() { document.getElementById('chat-logs').innerHTML = currChar.logs.map(m=>`<div class="m ${m.role==='u'?'u':'b'}">${m.text}</div>`).join(''); document.getElementById('chat-logs').scrollTop=9999; }
        function closeChat() { document.getElementById('chat-ui').style.display='none'; }

        // CÁC TÍNH NĂNG KHÁC
        function doCheckin() { candy += 20; lastCheck = new Date().toDateString(); localStorage.setItem('p_candy', candy); localStorage.setItem('p_lastCheck', lastCheck); triggerBoom("+20 🍬 FREE"); go(2); }
        function readImg(i) { if(i.files[0]) { let r=new FileReader(); r.onload=(e)=>tempImg=e.target.result; r.readAsDataURL(i.files[0]); } }
        function saveChar() { let n=document.getElementById('c-name').value; if(!n||!tempImg)return; chars.push({id:Date.now(),name:n,img:tempImg,logs:[]}); localStorage.setItem('p_chars',JSON.stringify(chars)); triggerBoom("XONG RỒI! ✨"); go(1); }
        function editProfile() {
            document.getElementById('modal').style.display='flex';
            document.getElementById('modal-body').innerHTML = `<h3>Sửa Hồ Sơ</h3><input id="p-name" class="input" value="${profile.name}"><br>Thay ảnh:<input type="file" onchange="readImg(this)" class="input"><button class="btn" onclick="saveP()">LƯU LẠI</button>`;
        }
        function saveP() { profile.name=document.getElementById('p-name').value; if(tempImg)profile.avt=tempImg; localStorage.setItem('p_profile',JSON.stringify(profile)); closeModal(); go(5); }
        function showQR() {
            document.getElementById('modal').style.display='flex';
            document.getElementById('modal-body').innerHTML = `<h3>Quét Mã Nạp Kẹo</h3><img src="https://img.vietqr.io/image/MB-0987654321-compact2.png?amount=50000&addInfo=KEO%20HONG" style="width:100%;border-radius:15px"><button class="btn" onclick="closeModal()">ĐÃ CHUYỂN KHOẢN</button>`;
        }
        function closeModal() { document.getElementById('modal').style.display='none'; tempImg=""; }

        go(1);
    </script>
</body>
</html>
