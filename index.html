<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isu Chat - Thế Giới Kẹo Ngọt</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --pink-main: #FFC0CB;
            --pink-dark: #FF69B4;
            --bg-cream: #FFF5F7;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--bg-cream);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- MÀN HÌNH CHỜ (SPLASH SCREEN) --- */
        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--pink-main);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .loader {
            width: 80px;
            height: 80px;
            border: 8px solid #FFF;
            border-radius: 50%;
            border-top: 8px solid var(--pink-dark);
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- CẤU TRÚC APP --- */
        #app {
            display: none; /* Ẩn lúc đầu */
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background: white;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
            position: relative;
        }

        /* Thanh trạng thái Tim */
        .affinity-bar {
            background: var(--pink-main);
            padding: 10px;
            text-align: center;
            font-weight: bold;
            color: white;
        }

        /* Khu vực Chat */
        #chat-window {
            height: calc(100% - 150px);
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 14px;
            line-height: 1.4;
        }

        .bot { background: var(--pink-main); align-self: flex-start; border-bottom-left-radius: 0; }
        .user { background: #E0E0E0; align-self: flex-end; border-bottom-right-radius: 0; }

        /* Bong bóng suy nghĩ */
        .thought {
            font-style: italic;
            color: var(--pink-dark);
            font-size: 12px;
            margin-bottom: 5px;
            opacity: 0.8;
        }

        /* Thanh Tab Menu */
        .tab-bar {
            position: absolute;
            bottom: 0; width: 100%;
            height: 60px;
            background: white;
            border-top: 1px solid #EEE;
            display: flex;
            justify-content: space-around;
            align-items: center;
        }

        .tab-item { cursor: pointer; color: var(--pink-dark); font-weight: bold; }

        /* Thanh Input & Candy Tier */
        .input-area {
            position: absolute;
            bottom: 60px; width: 100%;
            padding: 10px;
            background: #FAFAFA;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }

        input {
            flex: 1;
            padding: 10px;
            border: 2px solid var(--pink-main);
            border-radius: 20px;
            outline: none;
        }

        .candy-button {
            margin-left: 10px;
            background: var(--pink-dark);
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 15px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader"></div>
        <h2 style="color: white; margin-top: 20px;">Isu Chat Checking...</h2>
    </div>

    <div id="app">
        <div class="affinity-bar" id="status-display">Bình thường 🤍 (0 Tim)</div>

        <div id="chat-window">
            <div class="message bot">Chào bạn! Isu đang đợi bạn mãi đó. Bạn có kẹo cho Isu không? ✨</div>
        </div>

        <div class="input-area">
            <button class="candy-button" style="background: gray; margin-right: 5px;"><</button>
            <input type="text" id="user-input" placeholder="Nhắn gì đó ngọt ngào...">
            <button class="candy-button" onclick="handleSend()">Gửi (20🍬)</button>
        </div>

        <div class="tab-bar">
            <div class="tab-item">Tab 1</div>
            <div class="tab-item" style="text-decoration: underline;">Chat</div>
            <div class="tab-item">Post</div>
            <div class="tab-item">User</div>
            <div class="tab-item" onclick="checkIn()">CheckIn</div>
        </div>
    </div>

    <script>
        // --- LOGIC CORE ---
        let candy = 100;
        let hearts = 0;

        // 1. Splash Screen 3 giây
        window.onload = () => {
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    document.getElementById('app').style.display = 'block';
                    // Hiệu ứng kẹo nổ chào mừng
                    candyExplosion();
                }, 500);
            }, 3000);
        };

        // 2. Hiệu ứng Kẹo nổ
        function candyExplosion() {
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#FFC0CB', '#FF69B4', '#FFFFFF']
            });
        }

        // 3. Xử lý Gửi tin nhắn (Logic mượt & sâu sắc)
        async function handleSend() {
            const input = document.getElementById('user-input');
            const chatWin = document.getElementById('chat-window');
            if (input.value.trim() === "") return;

            // Render tin nhắn User
            renderMsg(input.value, 'user');

            // Logic tính Tim (Giả lập AI chấm điểm)
            let text = input.value.toLowerCase();
            if (text.includes("thương") || text.includes("yêu")) {
                updateHearts(5);
                renderThought("Hành động của cậu ấy... làm mình bối rối quá...");
            } else {
                updateHearts(1);
            }

            input.value = "";
            candyExplosion(); // Kẹo nổ khi gửi

            // Giả lập AI trả lời (Sâu sắc & Không lặp)
            setTimeout(() => {
                renderMsg("Cảm ơn cậu đã nhắn tin với Isu nha! Isu sẽ ghi nhớ điều này vào nhật ký. 🍬", 'bot');
            }, 1000);
        }

        function renderMsg(text, sender) {
            const chatWin = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `message ${sender}`;
            div.innerText = text;
            chatWin.appendChild(div);
            chatWin.scrollTop = chatWin.scrollHeight;
        }

        function renderThought(text) {
            const chatWin = document.getElementById('chat-window');
            const div = document.createElement('div');
            div.className = `thought`;
            div.innerText = `💭 ${text}`;
            chatWin.appendChild(div);
        }

        function updateHearts(amount) {
            hearts += amount;
            let status = "Bình thường 🤍";
            if (hearts >= 10) status = "Thân thiết ✨";
            if (hearts >= 100) status = "Người yêu ❤️";
            document.getElementById('status-display').innerText = `${status} (${hearts} Tim)`;
        }

        // 4. Tab 5: Điểm danh
        function checkIn() {
            alert("Bạn nhận được 20 Kẹo điểm danh!");
            candy += 20;
            candyExplosion();
        }
    </script>
</body>
</html>
